<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge - Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="welcome-container" id="welcomeContainer">
        <!-- Welcome Content -->
        <div class="welcome-full">
            <div class="welcome-content">
                <h1 class="welcome-title">
                    Welcome to SkillForge 🚀
                </h1>
                <h2 class="welcome-subtitle">
                    Transform your skills into expertise
                </h2>
                <p class="welcome-description">
                    Join our comprehensive learning platform and start your journey to becoming an expert in your chosen field
                </p>
                
                <div class="features-list">
                    <div class="feature-item">
                        <i class="fas fa-graduation-cap"></i>
                        <span>Expert Courses</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-users"></i>
                        <span>Community Support</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-certificate"></i>
                        <span>Industry Certifications</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-chart-line"></i>
                        <span>Progress Tracking</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-trophy"></i>
                        <span>Achievement System</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Login Button -->
        <div class="login-action">
            <button class="login-btn-main" onclick="window.location.href='login.html'">
                <i class="fas fa-sign-in-alt"></i>
                Login to Your Account
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
