<!DOCTYPE html>
<html>
<head>
  <title>SkillForge - Login</title>
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="login-container">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="brand-section">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>SkillForge</span>
      </div>
      <h1>Welcome Back!</h1>
      <p>Continue your learning journey</p>
    </div>
    
    
  </div>

  <!-- Right Panel -->
  
    <div class="login-form">
      <div class="skillforge-logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>SkillForge</span>
      </div>
      <h2>Login</h2>
      <p class="form-subtitle">Enter your credentials to access your account</p>

      <div class="input-group">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="loginEmail" placeholder="Email Address">
      </div>

      <div class="input-group">
                  <i class="fa-solid fa-lock input-icon"></i>
      <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
        <input type="password" id="loginPassword" placeholder="Password">
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" onclick="forgotPassword()" class="forgot-link">Forgot password?</a>
      </div>

      <button class="login-btn" onclick="login()">
        Login
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="divider">
      <p class="signup-link">
        OR      </p>  </div>

      <button class="google-btn" onclick="googleLogin()">
        <i class="fa-brands fa-google"></i>
        Login with Google
      </button>
      <p id="message"></p>
      <div class="signup-link-bottom">
  <p>Don't have an account? 
    <a href="signup.html">Sign up</a>
  </p>
</div>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
