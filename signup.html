<!DOCTYPE html>
<html>
<head>
  <title>SkillForge - Signup</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="signup-container">
  <!-- Animated Rectangle Container -->
  <div class="rectangle-container">
    <div class="animated-rect rect-1"></div>
    <div class="animated-rect rect-2"></div>
    <div class="animated-rect rect-3"></div>
    <div class="animated-rect rect-4"></div>
  </div>

  <!-- Left Panel -->
  <div class="right-edge">
    <div class="brand-section">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>SkillForge</span>
      </div>
      <h1>Join SkillForge!</h1>
      <p>Start your learning journey today</p>
    </div>
    
    <div class="features">
      <div class="feature-item">
        <i class="fa-solid fa-rocket"></i>
        <span>Quick Setup</span>
      </div>
      <div class="feature-item">
        <i class="fa-solid fa-shield-halved"></i>
        <span>Secure Account</span>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  

    <div class="signup-form">
      <div class="right-edge"></div>
      <div class="floating-container">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
      </div>
      <div class="animated-header">
        <h2>Create Account</h2>
        <p class="form-subtitle">Join our learning community today</p>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="name" placeholder="Full Name">
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-graduation-cap input-icon"></i>
          <input type="text" id="year" placeholder="Academic Year">
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-target input-icon"></i>
          <input type="text" id="goal" placeholder="Learning Goals">
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-phone input-icon"></i>
          <input type="tel" id="phone" placeholder="Phone Number">
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" id="email" placeholder="Email Address">
        </div>
      </div>

     <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Password">
          <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <i class="fa-solid fa-calendar input-icon"></i>
          <input type="date" id="created-at" readonly>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          I agree to the Terms & Conditions
        </label>
      </div>

      <button class="signup-btn" onclick="signup()">
        Create Account
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="divider">
      <p class="signup-link">
        OR      </p>   </div>

      <button class="google-btn" onclick="googleLogin()">
        <i class="fa-brands fa-google"></i>
        Sign up with Google
      </button>

      <p id="message"></p>

      <p class="signup-link">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>
</div>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
